<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Clock</title>
  <meta name="theme-color" content="#0a0a0a"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Clock"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@100;200;300;400&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111;
      --border: #1c1c1c;
      --border2: #252525;
      --text: #e8e5df;
      --muted: #444;
      --muted2: #333;
      --dim: #888;
      --accent: #c8a96e;
      --accent-dim: #8a7040;
      --red: #e05a5a;
      --green: #5aaa6e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Azeret Mono', monospace;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      overflow: hidden;
    }

    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Azeret Mono', monospace;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 14px 8px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }

    .tab::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20%;
      right: 20%;
      height: 1px;
      background: var(--accent);
      opacity: 0;
      transform: scaleX(0.5);
      transition: opacity 0.25s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .tab.active { color: var(--text); }
    .tab.active::after { opacity: 1; transform: scaleX(1); }

    /* ── PANELS ── */
    .panels { flex: 1; position: relative; overflow: hidden; }

    .panel {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    .panel.active {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .panel.exit {
      opacity: 0;
      transform: translateY(-8px);
    }

    /* ── CLOCK FACE ── */
    .clock-face {
      position: relative;
      width: min(280px, 80vw);
      height: min(280px, 80vw);
      margin-bottom: 2rem;
      flex-shrink: 0;
    }

    .clock-ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 2;
    }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.25s linear, stroke 0.4s ease;
      filter: drop-shadow(0 0 4px rgba(200,169,110,0.35));
    }

    .ring-progress.chrono {
      stroke: var(--dim);
      filter: drop-shadow(0 0 3px rgba(136,136,136,0.25));
    }
    .ring-progress.urgent {
      stroke: var(--red);
      filter: drop-shadow(0 0 6px rgba(224,90,90,0.5));
    }

    .clock-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .clock-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    .clock-display {
      font-family: 'Azeret Mono', monospace;
      font-weight: 100;
      font-size: clamp(34px, 13vw, 52px);
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }

    .clock-display.urgent { color: var(--red); }

    .clock-ms {
      font-size: 14px;
      font-weight: 200;
      color: var(--muted);
      letter-spacing: 0.05em;
      min-height: 18px;
    }

    .clock-sublabel {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-dim);
      min-height: 14px;
    }

    /* ── CLOCK TICKS ── */
    .clock-ticks {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .ctrl-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: none;
      border: 1px solid var(--border2);
      color: var(--dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .ctrl-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: currentColor;
      opacity: 0;
      transform: scale(0);
      transition: transform 0.3s ease-out, opacity 0.3s ease-out;
    }

    .ctrl-btn:active::after {
      transform: scale(2);
      opacity: 0.08;
      transition: transform 0s, opacity 0s;
    }

    .ctrl-btn:active {
      transform: scale(0.91);
    }

    .ctrl-btn.primary {
      width: 64px;
      height: 64px;
      border-color: var(--accent);
      color: var(--accent);
    }

    .ctrl-btn.primary:active { background: rgba(200,169,110,0.08); }
    .ctrl-btn:active { border-color: var(--text); color: var(--text); }

    .ctrl-btn.running.primary {
      border-color: var(--text);
      color: var(--text);
    }

    .ctrl-btn:disabled { opacity: 0.2; pointer-events: none; }

    /* Pulse ring when running */
    .ctrl-btn.primary.running::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid currentColor;
      opacity: 0;
      animation: btnPulse 2s ease-out infinite;
    }

    @keyframes btnPulse {
      0%   { inset: -2px; opacity: 0.4; }
      100% { inset: -10px; opacity: 0; }
    }

    .preset-btn:hover { border-color: var(--dim); color: var(--text); }

    /* ── LAPS ── */
    .laps-wrap {
      width: 100%;
      max-width: 320px;
      max-height: 160px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .laps-wrap::-webkit-scrollbar { display: none; }

    .lap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--dim);
      animation: lapIn 0.2s ease-out;
    }

    @keyframes lapIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .lap:last-child { border-bottom: none; }
    .lap-num { font-size: 9px; letter-spacing: 0.1em; color: var(--muted2); }
    .lap-split { color: var(--text); font-weight: 300; }
    .lap-total { font-size: 10px; color: var(--muted); }
    .lap.best .lap-split { color: var(--green); }
    .lap.worst .lap-split { color: var(--red); }

    /* ── COUNTDOWN INPUT ── */
    .countdown-setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
    }

    .time-inputs {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .time-seg {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .time-seg-label {
      font-size: 8px;
      color: var(--muted2);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .time-seg-input {
      width: 68px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Azeret Mono', monospace;
      font-weight: 200;
      font-size: 28px;
      text-align: center;
      padding: 10px 4px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .time-seg-input:focus { border-color: var(--accent); }

    .time-colon {
      font-size: 28px;
      font-weight: 100;
      color: var(--muted2);
      padding-bottom: 18px;
    }

    .preset-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 3px;
      color: var(--dim);
      font-family: 'Azeret Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .preset-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ── TIME OF DAY ── */
    .tod-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .tod-time {
      font-family: 'Azeret Mono', monospace;
      font-weight: 100;
      font-size: clamp(52px, 18vw, 80px);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .tod-seconds {
      font-size: clamp(22px, 7vw, 34px);
      font-weight: 200;
      color: var(--dim);
      letter-spacing: 0.02em;
    }

    .tod-date {
      font-size: 11px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .tod-sub {
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--muted2);
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    .tod-ring-wrap {
      position: relative;
      width: min(240px, 72vw);
      height: min(240px, 72vw);
      margin-bottom: 1rem;
    }

    .tod-ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── DONE STATE ── */
    .done-flash {
      animation: doneFlash 0.7s ease-out;
    }

    @keyframes doneFlash {
      0%   { opacity: 1; color: var(--text); }
      20%  { opacity: 1; color: var(--accent); }
      40%  { opacity: 0.15; }
      60%  { opacity: 1; color: var(--accent); }
      80%  { opacity: 0.3; }
      100% { opacity: 1; color: var(--text); }
    }

    /* Completion overlay */
    .done-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
    }

    .done-overlay.fire {
      animation: overlayPulse 0.8s cubic-bezier(0.4,0,0.6,1) forwards;
    }

    @keyframes overlayPulse {
      0%   { opacity: 0;    background: transparent; }
      15%  { opacity: 1;    background: rgba(200,169,110,0.12); }
      40%  { opacity: 0.4;  background: rgba(200,169,110,0.06); }
      65%  { opacity: 0.8;  background: rgba(200,169,110,0.1); }
      100% { opacity: 0;    background: transparent; }
    }

    /* Done ring fill animation */
    @keyframes ringFill {
      from { stroke-dashoffset: var(--ring-c); }
      to   { stroke-dashoffset: 0; }
    }

    .ring-done {
      animation: ringFill 0.5s cubic-bezier(0.4,0,0.2,1) forwards !important;
      stroke: var(--accent) !important;
      filter: drop-shadow(0 0 8px rgba(200,169,110,0.6)) !important;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 9px 16px;
      border-radius: 3px;
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── TICK MARKS ── */
    .ring-ticks { pointer-events: none; }
    .tick-major { stroke: var(--border2); stroke-width: 2; }
    .tick-minor { stroke: var(--muted2); stroke-width: 1; opacity: 0.4; }

    /* ── INTERVAL RING GLOW ── */
    #iv-phase-ring {
      filter: drop-shadow(0 0 4px rgba(200,169,110,0.3));
      transition: stroke-dashoffset 0.25s linear, stroke 0.4s ease, filter 0.4s ease;
    }
    #iv-total-ring {
      transition: stroke-dashoffset 0.3s linear;
    }
    #iv-phase-ring[style*="--green"] {
      filter: drop-shadow(0 0 4px rgba(90,170,110,0.3));
    }
    svg { display: block; }

    .hidden { display: none !important; }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    /* ── COUNTDOWN MODE TOGGLE ── */
    .cd-mode-toggle {
      display: flex;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .cd-mode-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Azeret Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 8px 12px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .cd-mode-btn.active { background: rgba(200,169,110,0.1); color: var(--accent); }

    /* target time input */
    .target-time-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .target-time-input {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Azeret Mono', monospace;
      font-weight: 100;
      font-size: 42px;
      text-align: center;
      padding: 12px 16px;
      outline: none;
      width: 200px;
      letter-spacing: 0.02em;
      -webkit-appearance: none;
      appearance: none;
      color-scheme: dark;
    }
    .target-time-input:focus { border-color: var(--accent); }
    .target-time-hint {
      font-size: 9px;
      color: var(--muted2);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .target-tomorrow-badge {
      font-size: 9px;
      color: var(--accent-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-height: 14px;
    }

    /* ── INTERVAL TIMER ── */
    .interval-setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
    }
    .interval-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .interval-row-label {
      font-size: 9px;
      color: var(--muted2);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      width: 48px;
      flex-shrink: 0;
    }
    .interval-row-label.work { color: var(--accent-dim); }
    .interval-row-label.rest { color: #4a7a5a; }
    .interval-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Azeret Mono', monospace;
      font-weight: 200;
      font-size: 22px;
      text-align: center;
      padding: 8px 6px;
      outline: none;
      -webkit-appearance: none;
    }
    .interval-input:focus { border-color: var(--accent); }
    .interval-input-unit {
      font-size: 9px;
      color: var(--muted2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      width: 24px;
    }
    .rounds-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rounds-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: none;
      border: 1px solid var(--border2);
      color: var(--dim);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .rounds-btn:active { border-color: var(--accent); color: var(--accent); }
    .rounds-display {
      font-size: 28px;
      font-weight: 100;
      min-width: 48px;
      text-align: center;
    }

    /* interval running */
    .interval-phase-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 300;
      min-height: 16px;
    }
    .interval-phase-label.work { color: var(--accent); }
    .interval-phase-label.rest { color: var(--green); }

    .interval-rounds-info {
      font-size: 9px;
      color: var(--muted2);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── PROGRESS WIDGET ── */
    .progress-widget {
      width: 100%;
      max-width: 300px;
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .prog-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .prog-label {
      font-size: 8px;
      color: var(--muted2);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      width: 32px;
      flex-shrink: 0;
    }
    .prog-bar-wrap {
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }
    .prog-bar-fill {
      height: 100%;
      border-radius: 1px;
      background: var(--accent);
      transition: width 1s linear;
    }
    .prog-bar-fill.week { background: #5a8a6a; }
    .prog-bar-fill.year { background: #555; }
    .prog-pct {
      font-size: 9px;
      color: var(--muted);
      width: 32px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── WAKE LOCK INDICATOR ── */
    .wake-indicator {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 8px);
      right: 12px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
    }
    .wake-indicator.active { opacity: 1; }
    /* ── FLIP CLOCK ── */
    .flip-clock {
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .flip-group { display: flex; gap: 4px; }

    .flip-sep {
      font-family: 'Azeret Mono', monospace;
      font-weight: 100;
      font-size: clamp(28px, 9vw, 44px);
      color: var(--muted2);
      line-height: 1;
      margin-bottom: 4px;
      align-self: center;
    }

    .flip-card {
      position: relative;
      width: clamp(48px, 14vw, 68px);
      height: clamp(64px, 18vw, 90px);
      perspective: 400px;
    }

    /* static top half — shows CURRENT digit top */
    .flip-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: #161616;
      border-radius: 6px 6px 0 0;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 2px;
      border-bottom: 1px solid #0a0a0a;
      box-shadow: 0 -1px 0 #222 inset;
    }

    /* static bot half — shows CURRENT digit bottom */
    .flip-bot {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      background: #111;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 2px;
    }

    .flip-top span, .flip-bot span,
    .flip-fold-top span, .flip-fold-bot span {
      font-family: 'Azeret Mono', monospace;
      font-weight: 100;
      font-size: clamp(36px, 11vw, 58px);
      color: var(--text);
      line-height: 1;
      display: block;
      /* offset so the digit is centered across both halves */
    }

    .flip-top span { transform: translateY(50%); }
    .flip-bot span { transform: translateY(-50%); }

    /* the animated flap */
    .flip-fold {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      transform-origin: bottom center;
      transform-style: preserve-3d;
      /* default: not animating */
    }

    .flip-fold.flipping {
      animation: flipDown 0.35s ease-in forwards;
    }

    @keyframes flipDown {
      0%   { transform: rotateX(0deg);    }
      100% { transform: rotateX(-180deg); }
    }

    /* front face of flap = OLD digit top */
    .flip-fold-top {
      position: absolute;
      inset: 0;
      background: #1e1e1e;
      border-radius: 6px 6px 0 0;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 2px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    .flip-fold-top span { transform: translateY(50%); }

    /* back face of flap = NEW digit bottom */
    .flip-fold-bot {
      position: absolute;
      inset: 0;
      background: #111;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 2px;
      transform: rotateX(180deg);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .flip-fold-bot span { transform: translateY(-50%); }

    /* center crease line */
    .flip-card::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 1px;
      background: #0a0a0a;
      z-index: 10;
      pointer-events: none;
    }

    /* ── INSTALL PROMPT ── */
    .install-prompt {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 100;
      white-space: nowrap;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    .install-prompt.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .install-prompt-text {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .install-prompt-text strong {
      color: var(--text);
      font-weight: 300;
    }

    .install-btn {
      background: none;
      border: 1px solid var(--accent);
      border-radius: 3px;
      color: var(--accent);
      font-family: 'Azeret Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .install-btn:active { background: rgba(200,169,110,0.1); }

    .install-dismiss {
      background: none;
      border: none;
      color: var(--muted2);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
    }

    /* ── UPDATE BANNER ── */
    .update-banner {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: var(--bg2);
      border: 1px solid var(--accent-dim);
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      z-index: 100;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }

    .update-banner.show {
      transform: translateX(-50%) translateY(0);
    }

  </style>
</head>
<body>

<script>
// ── TAB SWITCHING ──────────────────────────────────────
function switchTab(id) {
  const prev = document.querySelector('.panel.active');
  const next = document.getElementById('panel-' + id);
  if (prev && prev !== next) {
    prev.classList.add('exit');
    prev.classList.remove('active');
    setTimeout(() => prev.classList.remove('exit'), 300);
  }
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.panel === id));
  // slight delay so exit starts first
  requestAnimationFrame(() => {
    if (next) next.classList.add('active');
  });
}

// ── TOAST ──────────────────────────────────────────────
let toastTmr;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── HELPERS ───────────────────────────────────────────
function pad(n, w=2) { return String(Math.floor(n)).padStart(w, '0'); }

function fmt(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  const main = h > 0 ? pad(h)+':'+pad(m)+':'+pad(s) : pad(m)+':'+pad(s);
  return { main, ms: '.'+pad(cs) };
}

function circumference(r) { return +(2 * Math.PI * r).toFixed(2); }

// ── TICK MARKS ────────────────────────────────────────
function buildTicks(svgGroupId, r, cx, cy, count) {
  const g = document.getElementById(svgGroupId);
  if (!g) return;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * 2 * Math.PI - Math.PI / 2;
    const isMajor = i % (count / 12) === 0;
    const outer = r + 1;
    const inner = r - (isMajor ? 8 : 4);
    const x1 = cx + outer * Math.cos(angle);
    const y1 = cy + outer * Math.sin(angle);
    const x2 = cx + inner * Math.cos(angle);
    const y2 = cy + inner * Math.sin(angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1.toFixed(2));
    line.setAttribute('y1', y1.toFixed(2));
    line.setAttribute('x2', x2.toFixed(2));
    line.setAttribute('y2', y2.toFixed(2));
    line.setAttribute('class', isMajor ? 'tick-major' : 'tick-minor');
    g.appendChild(line);
  }
}

buildTicks('cd-ticks', 92, 100, 100, 60);
buildTicks('chrono-ticks', 92, 100, 100, 60);

// ── DONE OVERLAY ─────────────────────────────────────
function fireDoneOverlay() {
  const el = document.getElementById('done-overlay');
  el.classList.remove('fire');
  void el.offsetWidth;
  el.classList.add('fire');
  setTimeout(() => el.classList.remove('fire'), 800);
}

function doneRingFill(ringId, circumferenceVal) {
  const ring = document.getElementById(ringId);
  if (!ring) return;
  ring.style.setProperty('--ring-c', circumferenceVal);
  ring.classList.add('ring-done');
  setTimeout(() => ring.classList.remove('ring-done'), 600);
}

// ── WAKE LOCK ─────────────────────────────────────────
let wakeLock = null;
let wakeLockEnabled = false;

async function toggleWakeLock() {
  if (!('wakeLock' in navigator)) { toast('Wake lock not supported'); return; }
  if (wakeLockEnabled) {
    wakeLockEnabled = false;
    if (wakeLock) { await wakeLock.release(); wakeLock = null; }
    document.getElementById('wake-indicator').classList.remove('active');
    document.getElementById('wake-btn').textContent = 'wake lock off';
    document.getElementById('wake-btn').style.color = 'var(--muted2)';
  } else {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLockEnabled = true;
      document.getElementById('wake-indicator').classList.add('active');
      document.getElementById('wake-btn').textContent = 'wake lock on';
      document.getElementById('wake-btn').style.color = 'var(--accent)';
      wakeLock.addEventListener('release', () => {
        if (wakeLockEnabled) { wakeLockEnabled = false; document.getElementById('wake-indicator').classList.remove('active'); }
      });
    } catch(e) { toast('Could not acquire wake lock'); }
  }
}

document.addEventListener('visibilitychange', async () => {
  if (wakeLockEnabled && document.visibilityState === 'visible') {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
});

// ── FLIP CLOCK ────────────────────────────────────────
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// Track last displayed digits to only flip on change
const flipState = { h1:null, h2:null, m1:null, m2:null, s1:null, s2:null };

function flipDigit(id, newVal) {
  const card = document.getElementById('flip-' + id);
  const topSpan  = document.getElementById('f' + id + '-top');
  const botSpan  = document.getElementById('f' + id + '-bot');
  const fold     = document.getElementById('fold-' + id);
  const foldTop  = document.getElementById('fold-' + id + '-top');
  const foldBot  = document.getElementById('fold-' + id + '-bot');

  const oldVal = flipState[id];
  if (oldVal === newVal) return; // no change, no flip

  // Set up: front face shows OLD top, back face shows NEW bottom
  foldTop.textContent = oldVal !== null ? oldVal : newVal;
  foldBot.textContent = newVal;

  // Static panels: top shows OLD (will reveal NEW after fold covers)
  // Bot shows NEW immediately (fold's back will land on it)
  botSpan.textContent = newVal;

  // Restart animation
  fold.classList.remove('flipping');
  void fold.offsetWidth; // reflow
  fold.classList.add('flipping');

  // After animation, update top to new val and remove flap
  setTimeout(() => {
    topSpan.textContent = newVal;
    fold.classList.remove('flipping');
    foldTop.textContent = newVal; // reset fold face to current
  }, 360);

  flipState[id] = newVal;
}

function tickTOD() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ampm = h >= 12 ? 'PM' : 'AM';

  // Split into individual digits
  const h1 = String(pad(h))[0], h2 = String(pad(h))[1];
  const m1 = String(pad(m))[0], m2 = String(pad(m))[1];
  const s1 = String(pad(s))[0], s2 = String(pad(s))[1];

  flipDigit('h1', h1);
  flipDigit('h2', h2);
  flipDigit('m1', m1);
  flipDigit('m2', m2);
  flipDigit('s1', s1);
  flipDigit('s2', s2);

  document.getElementById('tod-date').textContent =
    DAYS[now.getDay()] + ', ' + MONTHS[now.getMonth()] + ' ' + now.getDate();
  document.getElementById('tod-sub').textContent =
    ampm + ' · ' + Intl.DateTimeFormat().resolvedOptions().timeZone;

  updateProgress(now);
}

setInterval(tickTOD, 1000);
tickTOD();

// ── PROGRESS WIDGET ────────────────────────────────────
function updateProgress(now) {
  const dayPct = (now.getHours()*3600+now.getMinutes()*60+now.getSeconds())/86400;
  const dow = now.getDay();
  const weekSec = ((dow===0?7:dow)-1)*86400+now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  const weekPct = weekSec/(7*86400);
  const start = new Date(now.getFullYear(),0,1);
  const end = new Date(now.getFullYear()+1,0,1);
  const yearPct = (now-start)/(end-start);
  function set(id, pctId, pct) {
    const p = Math.min(100, +(pct*100).toFixed(1));
    document.getElementById(id).style.width = p+'%';
    document.getElementById(pctId).textContent = p+'%';
  }
  set('prog-day','prog-day-pct',dayPct);
  set('prog-week','prog-week-pct',weekPct);
  set('prog-year','prog-year-pct',yearPct);
}

let cdMode = 'duration';

function setCdMode(mode) {
  cdMode = mode;
  document.getElementById('cd-mode-duration').classList.toggle('active', mode==='duration');
  document.getElementById('cd-mode-target').classList.toggle('active', mode==='target');
  document.getElementById('cd-duration-inputs').classList.toggle('hidden', mode!=='duration');
  document.getElementById('cd-target-inputs').classList.toggle('hidden', mode!=='target');
  if (mode==='target') updateTargetBadge();
}

function updateTargetBadge() {
  const val = document.getElementById('cd-target-time').value;
  if (!val) { document.getElementById('cd-target-badge').textContent=''; return; }
  const ms = getTargetMs(val);
  document.getElementById('cd-target-badge').textContent = (ms > 86400000-1000) ? 'tomorrow' : '';
}

document.getElementById('cd-target-time').addEventListener('change', updateTargetBadge);
document.getElementById('cd-target-time').addEventListener('input', updateTargetBadge);

function getTargetMs(val) {
  if (!val) return null;
  const [th,tm] = val.split(':').map(Number);
  const now = new Date();
  const target = new Date(now);
  target.setHours(th,tm,0,0);
  let diff = target-now;
  if (diff <= 0) diff += 86400000;
  return diff;
}

// ── COUNTDOWN ─────────────────────────────────────────
const CD_C = circumference(92);
document.getElementById('cd-ring').setAttribute('stroke-dasharray', CD_C);

let cdTotal=0, cdRemaining=0, cdRunning=false, cdInterval=null;
let cdStartTime=null, cdPausedAt=0, cdIsTarget=false, cdTargetLabel='';

function setPreset(h,m,s) {
  document.getElementById('cd-h').value=h;
  document.getElementById('cd-m').value=m;
  document.getElementById('cd-s').value=s;
}

function cdGetMs() {
  const h=parseInt(document.getElementById('cd-h').value)||0;
  const m=parseInt(document.getElementById('cd-m').value)||0;
  const s=parseInt(document.getElementById('cd-s').value)||0;
  return (h*3600+m*60+s)*1000;
}

function cdStart() {
  let total;
  cdIsTarget = cdMode==='target';
  if (cdIsTarget) {
    const val = document.getElementById('cd-target-time').value;
    total = getTargetMs(val);
    if (!total||total<=0) { toast('Pick a future time'); return; }
    cdTargetLabel = 'until '+val;
  } else {
    total = cdGetMs();
    if (total<=0) { toast('Set a time first'); return; }
    cdTargetLabel = 'remaining';
  }
  cdTotal=total; cdRemaining=total; cdPausedAt=0; cdStartTime=Date.now(); cdRunning=true;
  document.getElementById('cd-running-label').textContent = cdTargetLabel;
  document.getElementById('cd-setup').classList.add('hidden');
  document.getElementById('cd-running').classList.remove('hidden');
  document.getElementById('cd-running').style.display='flex';
  cdInterval=setInterval(cdTick,50);
  cdTick();
  cdSetPlayIcon(true);
}

function cdTick() {
  const elapsed=Date.now()-cdStartTime+cdPausedAt;
  cdRemaining=Math.max(0,cdTotal-elapsed);
  const {main,ms}=fmt(cdRemaining);
  document.getElementById('cd-display').textContent=main;
  document.getElementById('cd-ms').textContent=ms;
  const pct=cdRemaining/cdTotal;
  document.getElementById('cd-ring').style.strokeDashoffset=CD_C*(1-pct);
  if (cdIsTarget) {
    const eta=new Date(Date.now()+cdRemaining);
    document.getElementById('cd-pct').textContent=pad(eta.getHours())+':'+pad(eta.getMinutes());
  } else {
    document.getElementById('cd-pct').textContent=Math.ceil(pct*100)+'%';
  }
  const isUrgent=pct<0.1;
  document.getElementById('cd-display').classList.toggle('urgent',isUrgent);
  document.getElementById('cd-ring').classList.toggle('urgent',isUrgent);
  if (cdRemaining<=0) cdDone();
}

function cdToggle() {
  if (cdRemaining<=0) return;
  cdRunning=!cdRunning;
  if (cdRunning) { cdStartTime=Date.now(); cdInterval=setInterval(cdTick,50); }
  else { cdPausedAt+=Date.now()-cdStartTime; clearInterval(cdInterval); }
  cdSetPlayIcon(cdRunning);
}

function cdSetPlayIcon(playing) {
  document.getElementById('cd-play-btn').classList.toggle('running',playing);
  document.getElementById('cd-play-icon').innerHTML=playing
    ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
}

function cdAddMin() { cdTotal+=60000; toast('+1 min'); }

function cdReset() {
  clearInterval(cdInterval); cdRunning=false; cdPausedAt=0; cdRemaining=0;
  document.getElementById('cd-setup').classList.remove('hidden');
  document.getElementById('cd-running').classList.add('hidden');
  document.getElementById('cd-ring').style.strokeDashoffset=0;
  document.getElementById('cd-display').classList.remove('urgent');
  document.getElementById('cd-ring').classList.remove('urgent');
}

function cdDone() {
  clearInterval(cdInterval); cdRunning=false;
  document.getElementById('cd-display').textContent='00:00';
  document.getElementById('cd-ms').textContent='.000';
  document.getElementById('cd-pct').textContent='done';
  document.getElementById('cd-ring').style.strokeDashoffset=CD_C;
  document.getElementById('cd-display').classList.add('done-flash');
  setTimeout(()=>document.getElementById('cd-display').classList.remove('done-flash'),700);
  cdSetPlayIcon(false);
  fireDoneOverlay();
  doneRingFill('cd-ring', CD_C);

  if (navigator.vibrate) navigator.vibrate([200,100,200,100,400]);

  toast("Time's up!");
}

// ── INTERVAL TIMER ────────────────────────────────────
let ivRounds=4, ivWorkMs=25*60000, ivRestMs=5*60000;
let ivCurrentRound=1, ivPhase='work', ivRunning=false;
let ivInterval=null, ivStartTime=null, ivElapsedInPhase=0;
let ivPhaseTotal=0, ivTotalElapsed=0, ivTotalMs=0;

const IV_PHASE_C=circumference(78);
const IV_TOTAL_C=circumference(92);
document.getElementById('iv-phase-ring').setAttribute('stroke-dasharray',IV_PHASE_C);
document.getElementById('iv-total-ring').setAttribute('stroke-dasharray',IV_TOTAL_C);

function ivChangeRounds(d) {
  ivRounds=Math.max(1,Math.min(20,ivRounds+d));
  document.getElementById('iv-rounds-display').textContent=ivRounds;
}

function ivPreset(work,rest,rounds) {
  document.getElementById('iv-work').value=work;
  document.getElementById('iv-rest').value=rest;
  ivRounds=rounds;
  document.getElementById('iv-rounds-display').textContent=rounds;
}

function ivStart() {
  const w=parseInt(document.getElementById('iv-work').value)||25;
  const r=parseInt(document.getElementById('iv-rest').value)||5;
  ivWorkMs=w*60000; ivRestMs=r*60000;
  ivTotalMs=(ivWorkMs+ivRestMs)*ivRounds-ivRestMs;
  ivCurrentRound=1; ivPhase='work'; ivPhaseTotal=ivWorkMs;
  ivElapsedInPhase=0; ivTotalElapsed=0; ivRunning=true; ivStartTime=Date.now();
  document.getElementById('iv-setup').classList.add('hidden');
  document.getElementById('iv-running').classList.remove('hidden');
  document.getElementById('iv-running').style.display='flex';
  ivInterval=setInterval(ivTick,50);
  ivUpdateDisplay();
  ivSetPlayIcon(true);
}

function ivTick() {
  const elapsed=Date.now()-ivStartTime+ivElapsedInPhase;
  const remaining=Math.max(0,ivPhaseTotal-elapsed);
  document.getElementById('iv-display').textContent=fmt(remaining).main;
  const phasePct=remaining/ivPhaseTotal;
  document.getElementById('iv-phase-ring').style.strokeDashoffset=IV_PHASE_C*(1-phasePct);
  const totalUsed=ivTotalElapsed+(Date.now()-ivStartTime);
  document.getElementById('iv-total-ring').style.strokeDashoffset=IV_TOTAL_C*(1-Math.min(1,totalUsed/ivTotalMs));
  if (remaining<=0) ivNextPhase();
}

function ivNextPhase() {
  ivTotalElapsed+=Date.now()-ivStartTime; ivElapsedInPhase=0;
  if (ivPhase==='work') {
    if (ivCurrentRound>=ivRounds) { ivDone(); return; }
    ivPhase='rest'; ivPhaseTotal=ivRestMs;
  } else {
    ivPhase='work'; ivPhaseTotal=ivWorkMs; ivCurrentRound++;
  }
  ivStartTime=Date.now(); ivUpdateDisplay();
  if (navigator.vibrate) navigator.vibrate(ivPhase==='work'?[150,80,150]:[100]);
  phaseSound(ivPhase==='work');
  if (Notification.permission==='granted') new Notification(ivPhase==='work'?'💪 Work!':'😌 Rest',{body:'Round '+ivCurrentRound+' of '+ivRounds});
}

function ivUpdateDisplay() {
  const el=document.getElementById('iv-phase-label');
  el.textContent=ivPhase; el.className='interval-phase-label '+ivPhase;
  document.getElementById('iv-rounds-info').textContent='round '+ivCurrentRound+' of '+ivRounds;
  document.getElementById('iv-phase-ring').style.stroke=ivPhase==='work'?'var(--accent)':'var(--green)';
}

function ivToggle() {
  ivRunning=!ivRunning;
  if (ivRunning) { ivStartTime=Date.now(); ivInterval=setInterval(ivTick,50); }
  else { ivElapsedInPhase+=Date.now()-ivStartTime; clearInterval(ivInterval); }
  ivSetPlayIcon(ivRunning);
}

function ivSkip() { clearInterval(ivInterval); ivNextPhase(); if (ivRunning) ivInterval=setInterval(ivTick,50); }

function ivReset() {
  clearInterval(ivInterval); ivRunning=false;
  document.getElementById('iv-setup').classList.remove('hidden');
  document.getElementById('iv-running').classList.add('hidden');
}

function ivSetPlayIcon(playing) {
  document.getElementById('iv-play-btn').classList.toggle('running',playing);
  document.getElementById('iv-play-icon').innerHTML=playing
    ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
}

function ivDone() {
  clearInterval(ivInterval); ivRunning=false;
  document.getElementById('iv-display').textContent='00:00';
  document.getElementById('iv-phase-label').textContent='done';
  document.getElementById('iv-phase-label').className='interval-phase-label';
  document.getElementById('iv-total-ring').style.strokeDashoffset=0;
  fireDoneOverlay();
  doneSound();
  if (navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
  if (Notification.permission==='granted') new Notification('Interval done 🎉',{body:ivRounds+' rounds complete!'});
  toast('All rounds done!');
  ivSetPlayIcon(false);
}

const CHR_C=circumference(92);
document.getElementById('chrono-ring').setAttribute('stroke-dasharray',CHR_C);
document.getElementById('chrono-ring').setAttribute('stroke-dashoffset',CHR_C);

let chrRunning=false, chrStartTime=null, chrElapsed=0;
let chrInterval=null, chrLaps=[], chrLastLap=0;

function chronoToggle() {
  chrRunning=!chrRunning;
  if (chrRunning) {
    chrStartTime=Date.now();
    document.getElementById('chrono-label').textContent='running';
    document.getElementById('chrono-lap-btn').disabled=false;
    document.getElementById('chrono-reset-btn').disabled=false;
    chronoRaf();
  } else {
    chrElapsed+=Date.now()-chrStartTime;
    if (chrInterval) { cancelAnimationFrame(chrInterval); chrInterval=null; }
    document.getElementById('chrono-label').textContent='paused';
  }
  chronoSetIcon(chrRunning);
}

function chronoRaf() {
  if (!chrRunning) return;
  chronoTick();
  chrInterval = requestAnimationFrame(chronoRaf);
}

function chronoTick() {
  const total=chrElapsed+(Date.now()-chrStartTime);
  const {main,ms}=fmt(total);
  document.getElementById('chrono-display').textContent=main;
  document.getElementById('chrono-ms').textContent=ms;
  document.getElementById('chrono-ring').style.strokeDashoffset=CHR_C*(1-(total%60000)/60000);
}

function chronoLap() {
  if (!chrRunning) return;
  lapSound();
  const total=chrElapsed+(Date.now()-chrStartTime);
  const split=total-chrLastLap; chrLastLap=total;
  chrLaps.unshift({n:chrLaps.length+1,split,total});
  if (chrLaps.length>1) {
    const splits=chrLaps.map(l=>l.split);
    const best=Math.min(...splits),worst=Math.max(...splits);
    chrLaps.forEach(l=>{l.best=l.split===best;l.worst=l.split===worst;});
  }
  document.getElementById('chrono-lap-label').textContent='lap '+chrLaps[0].n;
  renderLaps();
}

function renderLaps() {
  document.getElementById('laps-list').innerHTML=chrLaps.map(l=>
    '<div class="lap'+(l.best&&chrLaps.length>1?' best':'')+(l.worst&&chrLaps.length>1?' worst':'')+'">'+
    '<span class="lap-num">Lap '+l.n+'</span>'+
    '<span class="lap-split">'+fmt(l.split).main+fmt(l.split).ms+'</span>'+
    '<span class="lap-total">'+fmt(l.total).main+'</span></div>'
  ).join('');
}

function chronoReset() {
  if (chrInterval) { cancelAnimationFrame(chrInterval); chrInterval=null; }
  chrRunning=false; chrElapsed=0; chrStartTime=null; chrLaps=[]; chrLastLap=0;
  document.getElementById('chrono-display').textContent='00:00';
  document.getElementById('chrono-ms').textContent='.000';
  document.getElementById('chrono-label').textContent='ready';
  document.getElementById('chrono-lap-label').textContent='';
  document.getElementById('chrono-ring').style.strokeDashoffset=CHR_C;
  document.getElementById('laps-list').innerHTML='';
  document.getElementById('chrono-lap-btn').disabled=true;
  document.getElementById('chrono-reset-btn').disabled=true;
  chronoSetIcon(false);
}

function chronoSetIcon(playing) {
  document.getElementById('chrono-play-btn').classList.toggle('running',playing);
  document.getElementById('chrono-play-icon').innerHTML=playing
    ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';

let notifRequested = false;

let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq=880, dur=0.06, vol=0.18, type='sine') {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function clickSound() { beep(1200, 0.04, 0.1, 'square'); }
function lapSound()   { beep(880,  0.07, 0.15); }
function doneSound()  { beep(660, 0.12, 0.22); setTimeout(()=>beep(880,0.12,0.22),130); setTimeout(()=>beep(1100,0.2,0.22),260); }
function phaseSound(isWork) { beep(isWork ? 880 : 660, 0.1, 0.18); }

  const active = document.querySelector('.tab.active')?.dataset.panel;

      e.preventDefault();

      else if (active === 'interval') ivReset();

// ── Service Worker registration ───────────────────────
let swRegistration = null;
let scheduledTimerId = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => {
      swRegistration = reg;

      // Show update banner if a new SW is waiting
      if (reg.waiting) showUpdateBanner();
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });

      // Check for updates periodically (every 60s while app is open)
      setInterval(() => reg.update(), 60_000);
    })
    .catch(() => {});

  // When SW controller changes (after skipWaiting), reload
  navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());

  // Listen for scheduled timer confirmation from SW
  navigator.serviceWorker.addEventListener('message', event => {
    if (event.data?.type === 'TIMER_SCHEDULED') {
      scheduledTimerId = event.data.id;
    }
  });
}

function showUpdateBanner() {
  const banner = document.getElementById('update-banner');
  banner.classList.add('show');
  banner.addEventListener('click', () => {
    if (swRegistration?.waiting) {
      swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
  });
}

// ── Background timer scheduling via SW ───────────────
// When the page is hidden and a timer is running, tell the SW
// to fire a notification at the right time.

function scheduleSwTimer(label, delayMs) {
  cancelSwTimer();
  if (!navigator.serviceWorker?.controller) return;
  navigator.serviceWorker.controller.postMessage({
    type: 'SCHEDULE_TIMER', label, delayMs
  });
}

function cancelSwTimer() {
  if (scheduledTimerId == null) return;
  if (!navigator.serviceWorker?.controller) return;
  navigator.serviceWorker.controller.postMessage({
    type: 'CANCEL_TIMER', id: scheduledTimerId
  });
  scheduledTimerId = null;
}

// On visibility change, register/cancel SW-based notifications
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    // Countdown running?
    if (cdRunning && cdRemaining > 0) {
      scheduleSwTimer(cdIsTarget ? cdTargetLabel : 'Countdown ended', cdRemaining);
    }
    // Interval running?
    else if (ivRunning) {
      const elapsed = Date.now() - ivStartTime + ivElapsedInPhase;
      const remaining = Math.max(0, ivPhaseTotal - elapsed);
      scheduleSwTimer('Interval timer done', ivTotalMs - ivTotalElapsed - (Date.now() - ivStartTime));
    }
  } else {
    // Back in foreground — cancel SW notification (page will handle it)
    cancelSwTimer();
    // Re-acquire wake lock if it was enabled
    if (wakeLockEnabled) {
      navigator.wakeLock?.request('screen').then(l => { wakeLock = l; }).catch(() => {});
    }
  }
});
</script>
</body>
